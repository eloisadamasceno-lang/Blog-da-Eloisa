<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Viagem da Eloisa</title>
    
    <style>
        header {
            background-color: #008080; /* Azul-turquesa escuro */
            color: #FFFFFF;            /* Letras brancas */
            text-align: center;        /* Centraliza o texto */
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 0;           /* Dá um espaço interno no cabeçalho */
        }

        main {
            background-color: #F4F6F7;  /* Fundo cinza bem clarinho para o texto */
            color: #2C3E50;             /* Letras em azul escuro/grafite */
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;              /* Afasta o texto das bordas */
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu blog de viagens</h1>
        <p>Vou compartilhar minhas aventuras, roteiros e dicas sobre os melhores destinos do mundo.</p>
    </header>

    <main>
        <h2>Minha primeira viagem</h2>
        <p>Por: Eloisa</p>
        <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar fotos, histórias e muitas curiosidades sobre os lugares que sempre sonhei em conhecer.</p>
    </main>

</body>
</html>
